<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Store the current URL in sessionStorage.redirect
      sessionStorage.setItem('redirect', window.location.href);
      // Redirect to the root /
      window.location.replace('/');
    </script>
  </head>
  <body>
  </body>
</html>
